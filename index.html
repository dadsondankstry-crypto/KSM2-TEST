<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRONOS AnimeFire Testador Separado</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#050505;color:#fff;font-family:Arial,Helvetica,sans-serif}
header{background:#000;border-bottom:2px solid #8a2be2;padding:18px 28px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.brand{color:#ffcc00;font-size:24px;font-weight:900;text-shadow:0 0 8px #ffcc00}
.sub{color:#ddd}
.wrap{max-width:1280px;margin:auto;padding:24px}
.box{border:1px solid #222;background:#080808;border-radius:10px;padding:18px;margin-bottom:18px}
.row{display:grid;grid-template-columns:100px 1fr;gap:12px;align-items:center;margin:10px 0}
label{color:#00ffff;font-weight:900;text-transform:uppercase}
input,textarea{width:100%;background:#000;color:#fff;border:1px solid #00ffff;border-radius:5px;padding:12px;font-size:15px}
textarea{min-height:90px;font-family:Consolas,monospace}
.buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px}
button{background:#111;color:#fff;border:1px solid #8a2be2;border-radius:6px;padding:12px 15px;font-weight:900;cursor:pointer}
button:hover{background:#8a2be2}
.btn-cyan{border-color:#00ffff;color:#00ffff}
.btn-cyan:hover{background:#00ffff;color:#000}
.btn-yellow{border-color:#ffcc00;color:#ffcc00}
.btn-yellow:hover{background:#ffcc00;color:#000}
.status{color:#ffcc00;font-size:18px;font-weight:900;margin:12px 0}
.players{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{border:1px solid #00ffff;background:#050505;border-radius:8px;padding:12px;cursor:pointer;min-height:150px}
.card.active{border-color:#ffcc00;box-shadow:0 0 16px #ffcc00}
.card h3{margin:0 0 8px;color:#ffcc00}
.tag{display:inline-block;border:1px solid #00ffff;color:#00ffff;padding:4px 7px;border-radius:3px;font-size:11px;font-weight:900;margin:0 6px 8px 0}
.url{font-size:12px;color:#ddd;word-break:break-all}
.playerBox{width:100%;aspect-ratio:16/9;border:2px solid #00ffff;border-radius:8px;background:#000;overflow:hidden}
.playerBox iframe,.playerBox video{width:100%;height:100%;border:0;background:#000}
pre{white-space:pre-wrap;word-break:break-word;background:#000;border:1px solid #222;border-radius:8px;padding:14px;max-height:50vh;overflow:auto;color:#ddd}
small{color:#aaa}
</style>
</head>
<body>
<header>
  <div class="brand">CRONOS AnimeFire</div>
  <div class="sub">Testador separado • Players • Fonte segura</div>
</header>

<main class="wrap">
<section class="box">
  <div class="row"><label>Worker</label><input id="worker" value="https://dark-boat-e972.getapi-oi.workers.dev/"></div>
  <div class="row"><label>URL</label><input id="url" value="https://animefire.io/animes/kami-no-shizuku/1"></div>
  <div class="buttons">
    <button class="btn-cyan" onclick="detectar()">Detectar players</button>
    <button class="btn-yellow" onclick="testarSelecionado()">Testar selecionado</button>
    <button onclick="copiarEmbed()">Copiar embed</button>
    <button onclick="copiarURL()">Copiar URL</button>
    <button onclick="abrirFonte()">Fonte segura</button>
    <button onclick="abrirDados()">Dados</button>
    <button onclick="baixarJSON()">Baixar JSON</button>
  </div>
  <div id="status" class="status">Pronto.</div>
  <small>Use uma URL de episódio do AnimeFire.</small>
</section>

<section class="box">
  <h2 style="color:#ffcc00;margin-top:0">Players detectados</h2>
  <div id="players" class="players"></div>
</section>

<section class="box">
  <h2 style="color:#ffcc00;margin-top:0">Teste do player</h2>
  <div id="playerBox" class="playerBox"></div>
</section>

<section class="box">
  <h2 style="color:#ffcc00;margin-top:0">Embed / JSON</h2>
  <textarea id="embedOut" placeholder="Embed selecionado aparece aqui"></textarea>
  <pre id="saida"></pre>
</section>
</main>

<script>
let ultimo = null;
let selecionado = -1;

function workerBase() {
  return document.getElementById('worker').value.trim().replace(/\/?$/, '/');
}

function alvoURL() {
  return document.getElementById('url').value.trim();
}

function api(modo) {
  return workerBase() + '?modo=' + encodeURIComponent(modo) + '&url=' + encodeURIComponent(alvoURL());
}

async function detectar() {
  const status = document.getElementById('status');
  const saida = document.getElementById('saida');
  const playersBox = document.getElementById('players');
  const playerBox = document.getElementById('playerBox');

  status.textContent = 'Detectando players...';
  saida.textContent = '';
  playersBox.innerHTML = '';
  playerBox.innerHTML = '';
  selecionado = -1;

  try {
    const r = await fetch(api('players'), {cache:'no-store'});
    const data = await r.json();
    ultimo = data;
    saida.textContent = JSON.stringify(data, null, 2);
    status.textContent = 'HTTP ' + r.status + ' • ' + (data.totalDetectado || 0) + ' player(s)';

    if (!data.players || !data.players.length) {
      playersBox.innerHTML = '<div class="card"><h3>Nenhum player encontrado</h3><div class="url">Tente outra URL de episódio ou veja a fonte segura.</div></div>';
      return;
    }

    playersBox.innerHTML = data.players.map((p, i) => `
      <div class="card" onclick="selecionar(${i})" id="cardPlayer${i}">
        <h3>${escapeHtml(p.nome || 'Player')}</h3>
        <div class="tag">${escapeHtml(p.tipo || '')}</div>
        <div class="tag">${escapeHtml(p.origem || '')}</div>
        <div class="tag">${p.bloqueado ? 'bloqueado/info' : 'seguro'}</div>
        <div class="url">${escapeHtml(p.src || '')}</div>
        <div class="url" style="color:#ffcc00;margin-top:8px;">${escapeHtml(p.motivo || '')}</div>
      </div>
    `).join('');

    selecionar(0);
  } catch(e) {
    status.textContent = 'Erro ao detectar';
    saida.textContent = e.message || String(e);
  }
}

function selecionar(i) {
  selecionado = i;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('cardPlayer' + i);
  if (card) card.classList.add('active');

  const p = ultimo && ultimo.players ? ultimo.players[i] : null;
  document.getElementById('embedOut').value = p ? (p.embedCode || p.embed || '') : '';
}

function testarSelecionado() {
  const p = ultimo && ultimo.players ? ultimo.players[selecionado] : null;
  if (!p) {
    document.getElementById('status').textContent = 'Nenhum player selecionado.';
    return;
  }
  document.getElementById('playerBox').innerHTML = p.embed || p.embedCode || '';
  document.getElementById('status').textContent = 'Testando: ' + (p.nome || 'Player');
}

async function copiarEmbed() {
  const txt = document.getElementById('embedOut').value;
  if (!txt) return;
  await navigator.clipboard.writeText(txt);
  document.getElementById('status').textContent = 'Embed copiado.';
}

async function copiarURL() {
  const p = ultimo && ultimo.players ? ultimo.players[selecionado] : null;
  if (!p) return;
  await navigator.clipboard.writeText(p.src || '');
  document.getElementById('status').textContent = 'URL copiada.';
}

function abrirFonte() {
  window.open(api('fonte'), '_blank');
}

function abrirDados() {
  window.open(api('dados'), '_blank');
}

async function baixarJSON() {
  if (!ultimo) await detectar();
  const blob = new Blob([JSON.stringify(ultimo, null, 2)], {type:'application/json;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'animefire-players-detectados.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}
</script>
</body>
</html>
